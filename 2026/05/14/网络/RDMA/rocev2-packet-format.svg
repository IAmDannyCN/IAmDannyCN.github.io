<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="300" viewBox="0 0 1160 300">
  <defs>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .tiny { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .blue { fill: #e0f2fe; stroke: #0369a1; }
      .green { fill: #dcfce7; stroke: #15803d; }
      .amber { fill: #fef3c7; stroke: #b45309; }
      .rose { fill: #ffe4e6; stroke: #be123c; }
      .violet { fill: #ede9fe; stroke: #6d28d9; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text class="title" x="40" y="46">RoCEv2 报文结构</text>
  <rect class="box" x="40" y="115" width="145" height="76"/><text class="small" x="112.5" y="149" text-anchor="middle">Ethernet</text><text class="small" x="112.5" y="167" text-anchor="middle">MAC / Type</text>
  <rect class="box blue" x="205" y="115" width="145" height="76"/><text class="small" x="277.5" y="149" text-anchor="middle">IP</text><text class="small" x="277.5" y="167" text-anchor="middle">DSCP / ECN</text>
  <rect class="box" x="370" y="115" width="125" height="76"/><text class="small" x="432.5" y="149" text-anchor="middle">UDP</text><text class="small" x="432.5" y="167" text-anchor="middle">dst 4791</text>
  <rect class="box violet" x="515" y="115" width="155" height="76"/><text class="small" x="592.5" y="140" text-anchor="middle">BTH</text><text class="small" x="592.5" y="158" text-anchor="middle">opcode / QPN</text><text class="small" x="592.5" y="176" text-anchor="middle">PSN</text>
  <rect class="box amber" x="690" y="115" width="170" height="76"/><text class="small" x="775" y="140" text-anchor="middle">RETH</text><text class="small" x="775" y="158" text-anchor="middle">remote addr</text><text class="small" x="775" y="176" text-anchor="middle">rkey / length</text>
  <rect class="box green" x="880" y="115" width="115" height="76"/><text class="small" x="937.5" y="158" text-anchor="middle">Payload</text>
  <rect class="box rose" x="1015" y="115" width="90" height="76"/><text class="small" x="1060" y="158" text-anchor="middle">ICRC</text>
  <path class="line" d="M 185 153 L 205 153"/><path class="line" d="M 350 153 L 370 153"/><path class="line" d="M 495 153 L 515 153"/><path class="line" d="M 670 153 L 690 153"/><path class="line" d="M 860 153 L 880 153"/><path class="line" d="M 995 153 L 1015 153"/>
  <text class="tiny" x="775" y="220" text-anchor="middle">RDMA Write 通常携带 RETH，用于描述远端地址、rkey 与长度</text>
  </svg>
