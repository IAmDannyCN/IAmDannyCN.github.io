<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="300" viewBox="0 0 1080 300">
  <defs>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .tiny { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .blue { fill: #e0f2fe; stroke: #0369a1; }
      .green { fill: #dcfce7; stroke: #15803d; }
      .amber { fill: #fef3c7; stroke: #b45309; }
      .rose { fill: #ffe4e6; stroke: #be123c; }
      .violet { fill: #ede9fe; stroke: #6d28d9; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <text class="title" x="40" y="46">RDMA DDR 到 DDR 数据通路</text>
  <rect class="box green" x="40" y="118" width="145" height="70"/><text class="small" x="112.5" y="149" text-anchor="middle">Host A DDR</text><text class="small" x="112.5" y="167" text-anchor="middle">源数据块</text>
  <rect class="box blue" x="260" y="118" width="145" height="70"/><text class="small" x="332.5" y="158" text-anchor="middle">Host A RNIC</text>
  <rect class="box amber" x="480" y="118" width="120" height="70"/><text class="small" x="540" y="158" text-anchor="middle">Leaf</text>
  <rect class="box amber" x="665" y="118" width="120" height="70"/><text class="small" x="725" y="158" text-anchor="middle">Spine</text>
  <rect class="box blue" x="850" y="118" width="145" height="70"/><text class="small" x="922.5" y="158" text-anchor="middle">Host B RNIC</text>
  <rect class="box green" x="850" y="220" width="145" height="55"/><text class="small" x="922.5" y="252.5" text-anchor="middle">Host B DDR</text>
  <path class="line" d="M 185 153 L 260 153"/><text class="tiny" x="222.5" y="146" text-anchor="middle">PCIe DMA Read</text>
  <path class="line" d="M 405 153 L 480 153"/><text class="tiny" x="442.5" y="146" text-anchor="middle">RoCEv2</text>
  <path class="line" d="M 600 153 L 665 153"/>
  <path class="line" d="M 785 153 L 850 153"/><text class="tiny" x="817.5" y="146" text-anchor="middle">Ethernet</text>
  <path class="line" d="M 922 188 L 922 220"/><text class="tiny" x="922" y="197" text-anchor="middle">PCIe DMA Write</text>
  </svg>
